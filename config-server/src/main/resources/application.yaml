server:
  port: 8888  # 8888 is the global standard port for Config Servers

spring:
  application:
    name: config-server
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: native  # 'native' means we will read files from our local folder, not from GitHub (to keep it simple for now!)
  cloud:
    config:
      server:
        native:
          # Tells Spring to look in the folder at the root of the project
          search-locations: file:./config-repo/
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Tells this app where the Phonebook is